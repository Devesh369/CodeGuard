{% load static %}

<!DOCTYPE html>
<html>

<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <title>Register | CodeGuard</title>

    <link rel="stylesheet"
          href="{% static 'css/auth.css' %}">

</head>


<body>

<div class="auth-container">

    <div class="auth-card">

        <div class="logo">

            <h1>🛡 CodeGuard</h1>

            <p>
                AI Code Security Platform
            </p>

        </div>

        <form method="POST">

            {% csrf_token %}

            <div class="form-group">

    <label>Username</label>
    {{ form.username }}

</div>

<div class="form-group">

    <label>Email</label>
    {{ form.email }}

</div>

<div class="form-group">

    <label>Password</label>

    <div class="password-wrapper">

        {{ form.password1 }}

        <i
        class="fa-solid fa-eye toggle-password"
        id="togglePassword1">
        </i>

    </div>

</div>
<div class="form-group">

    <label>Confirm Password</label>

    <div class="password-wrapper">

        {{ form.password2 }}

        <i
        class="fa-solid fa-eye toggle-password"
        id="togglePassword2">
        </i>

    </div>

</div>

            <button
                class="auth-btn"
                type="submit">

                Create Account

            </button>

        </form>

        <div class="auth-footer">

            Already have an account?

            <a href="{% url 'login' %}">
                Login
            </a>

        </div>

    </div>

</div>

<script>

function togglePassword(
fieldId,
iconId
){

    const field =
    document.getElementById(
    fieldId
    );

    const icon =
    document.getElementById(
    iconId
    );

    icon.addEventListener(
    "click",
    function(){

        const type =
        field.type === "password"
        ? "text"
        : "password";

        field.type = type;

        icon.classList.toggle(
        "fa-eye-slash"
        );

    });

}

togglePassword(
"id_password1",
"togglePassword1"
);

togglePassword(
"id_password2",
"togglePassword2"
);

</script>



</body>
</html>
